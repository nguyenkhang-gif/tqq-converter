<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manga Converter</title>
<style>
:root {
  --bg:       #0d0d0d;
  --surface:  #161616;
  --surface2: #1f1f1f;
  --border:   #2a2a2a;
  --accent:   #7c3aed;
  --acc-h:    #6d28d9;
  --success:  #16a34a;
  --error:    #dc2626;
  --warn:     #d97706;
  --info:     #2563eb;
  --text:     #e5e5e5;
  --muted:    #737373;
  --r:        8px;
  --font:     system-ui, -apple-system, sans-serif;
  --mono:     'SF Mono', 'Fira Code', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }

/* ── layout ── */
.app { display: grid; grid-template-columns: 380px 1fr; grid-template-rows: 48px 1fr; height: 100vh; gap: 0; }
header { grid-column: 1/-1; display: flex; align-items: center; gap: 12px; padding: 0 20px; background: var(--surface); border-bottom: 1px solid var(--border); }
.sidebar { overflow-y: auto; border-right: 1px solid var(--border); padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.main    { overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }

/* ── header ── */
header h1 { font-size: 15px; font-weight: 600; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); margin-left: auto; }
.dot.connected { background: var(--success); }
.dot.error     { background: var(--error); }

/* ── cards ── */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 14px; }
.card h2 { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 12px; }

/* ── quick start ── */
.url-row { display: flex; gap: 8px; }
.url-row input { flex: 1; min-width: 0; }
.quick-btns { display: flex; gap: 8px; margin-top: 8px; }
.quick-btns button { flex: 1; font-size: 12px; }

/* ── config sections ── */
details { border-radius: var(--r); overflow: hidden; }
details + details { margin-top: 6px; }
summary { padding: 10px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r); cursor: pointer; font-size: 12px; font-weight: 600; list-style: none; display: flex; align-items: center; gap: 6px; user-select: none; }
summary::after { content: '›'; margin-left: auto; transition: transform .2s; }
details[open] summary { border-radius: var(--r) var(--r) 0 0; }
details[open] summary::after { transform: rotate(90deg); }
.detail-body { border: 1px solid var(--border); border-top: none; border-radius: 0 0 var(--r) var(--r); padding: 12px; display: flex; flex-direction: column; gap: 8px; background: var(--surface); }

/* ── form ── */
.field { display: flex; flex-direction: column; gap: 4px; }
.field label { font-size: 11px; color: var(--muted); }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
input[type=text], input[type=number], input[type=url], select, textarea {
  background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); font-family: var(--font); font-size: 13px;
  padding: 6px 9px; width: 100%; outline: none; transition: border-color .15s;
}
input:focus, select:focus, textarea:focus { border-color: var(--accent); }
textarea { font-family: var(--mono); font-size: 11px; resize: vertical; }
input[type=range] { accent-color: var(--accent); width: 100%; }
.range-row { display: flex; align-items: center; gap: 8px; }
.range-val { font-size: 12px; color: var(--accent); min-width: 28px; text-align: right; }
.check-row { display: flex; align-items: center; gap: 8px; font-size: 13px; }
.check-row input[type=checkbox] { accent-color: var(--accent); width: 14px; height: 14px; }

/* ── sections table ── */
.sec-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.sec-table th { text-align: left; color: var(--muted); font-weight: 500; padding: 4px 6px; }
.sec-table td { padding: 3px 4px; }
.sec-table input { padding: 4px 6px; font-size: 12px; }
.sec-table input[type=number] { width: 62px; }
.sec-table .del-btn { background: none; border: none; color: var(--error); cursor: pointer; font-size: 14px; padding: 2px 6px; border-radius: 4px; }
.sec-table .del-btn:hover { background: #2a1a1a; }
.add-sec { margin-top: 6px; font-size: 12px; }

/* ── urls badge ── */
.url-badge { font-size: 11px; color: var(--muted); padding: 4px 8px; background: var(--surface2); border-radius: 4px; cursor: pointer; border: 1px solid var(--border); display: inline-flex; align-items: center; gap: 6px; transition: background .15s; }
.url-badge:hover { background: #2a2a2a; }
.url-badge span { color: var(--accent); font-weight: 600; }

/* ── modal ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); display: flex; align-items: center; justify-content: center; z-index: 100; }
.modal-overlay.hidden { display: none; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); width: 640px; max-width: 95vw; max-height: 85vh; display: flex; flex-direction: column; }
.modal-header { display: flex; align-items: center; padding: 14px 16px; border-bottom: 1px solid var(--border); gap: 8px; }
.modal-header h3 { font-size: 14px; font-weight: 600; flex: 1; }
.modal-header .close-btn { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 0 4px; line-height: 1; }
.modal-header .close-btn:hover { color: var(--text); }
.modal-body { flex: 1; overflow-y: auto; padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }
.modal-footer { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; align-items: center; }
.modal-footer .count { font-size: 12px; color: var(--muted); margin-right: auto; }
.url-list { flex: 1; min-height: 200px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px; font-family: var(--mono); font-size: 11px; resize: none; color: var(--text); line-height: 1.7; overflow-y: auto; }
.url-list:focus { outline: none; border-color: var(--accent); }
.add-urls-area textarea { font-family: var(--mono); font-size: 11px; min-height: 80px; }
.add-urls-area label { font-size: 11px; color: var(--muted); margin-bottom: 4px; display: block; }

/* ── buttons ── */
button { border: none; border-radius: 6px; cursor: pointer; font-family: var(--font); font-size: 13px; font-weight: 500; padding: 7px 14px; transition: background .15s, opacity .15s; }
button:disabled { opacity: .4; cursor: not-allowed; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover:not(:disabled) { background: var(--acc-h); }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover:not(:disabled) { background: #2a2a2a; }
.btn-danger { background: #3a1a1a; color: var(--error); border: 1px solid #5a2a2a; }
.btn-danger:hover:not(:disabled) { background: #4a2020; }
.btn-success { background: #0f2e1e; color: var(--success); border: 1px solid #1a5a3a; }
.btn-success:hover:not(:disabled) { background: #163d28; }

/* ── action buttons ── */
.actions-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.actions-grid button { font-size: 12px; }
.actions-row { display: flex; gap: 8px; margin-top: 8px; }
.actions-row button { flex: 1; }
.save-row { display: flex; justify-content: flex-end; margin-top: 4px; }

/* ── steps ── */
.steps { display: flex; gap: 4px; flex-wrap: wrap; }
.step-pill { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); }
.step-pill.active  { background: #2a1f4a; border-color: var(--accent); color: var(--accent); }
.step-pill.done    { background: #0f2e1e; border-color: var(--success); color: var(--success); }
.step-pill.error   { background: #3a1a1a; border-color: var(--error); color: var(--error); }
.step-pill.stopped { background: #2a2a1a; border-color: var(--warn); color: var(--warn); }

/* ── progress bar ── */
.progress-wrap { margin-top: 8px; }
.progress-bar { height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 4px; width: 0%; transition: width .3s ease; }
.progress-text { font-size: 11px; color: var(--muted); margin-top: 4px; }

/* ── status badge ── */
.status-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; padding: 4px 10px; border-radius: 20px; background: var(--surface2); }
.status-badge.running { background: #2a1f4a; color: var(--accent); }
.status-badge.done    { background: #0f2e1e; color: var(--success); }
.status-badge.error   { background: #3a1a1a; color: var(--error); }
.status-badge.stopped { background: #2a2a1a; color: var(--warn); }
.status-badge.idle    { color: var(--muted); }
.spinner { width: 10px; height: 10px; border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── log ── */
.log-controls { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.log-controls label { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 4px; }
.log-controls button { font-size: 11px; padding: 3px 10px; margin-left: auto; }
.log-box { background: var(--bg); border: 1px solid var(--border); border-radius: var(--r); padding: 10px 12px; height: 380px; overflow-y: auto; font-family: var(--mono); font-size: 12px; line-height: 1.6; }
.log-line { white-space: pre-wrap; word-break: break-all; }
.log-line.info  { color: #ccc; }
.log-line.warn  { color: var(--warn); }
.log-line.ok    { color: var(--success); }
.log-line.err   { color: var(--error); }
.log-line.step  { color: var(--accent); font-weight: bold; border-top: 1px solid var(--border); margin-top: 4px; padding-top: 4px; }
.log-empty { color: var(--muted); font-style: italic; }
</style>
</head>
<body>
<div class="app">

<!-- ── header ── -->
<header>
  <h1>🗂 Manga Converter</h1>
  <div id="statusBadge" class="status-badge idle">Idle</div>
  <div id="dot" class="dot" title="SSE connection"></div>
  <a href="/reader.html" target="_blank" style="margin-left:8px;font-size:12px;color:var(--muted);text-decoration:none;padding:5px 10px;border:1px solid var(--border);border-radius:6px;">📖 Reader</a>
</header>

<!-- ── sidebar ── -->
<aside class="sidebar">

  <!-- Quick Start -->
  <div class="card">
    <h2>Quick Start</h2>
    <div class="url-row">
      <input type="url" id="quickUrl" placeholder="Chapter list page URL…" />
    </div>
    <div class="quick-btns">
      <button class="btn-primary" onclick="quickRun(['fetchHtml','chapters','scrape','compress','epub'])">▶ Fetch & Run All</button>
      <button class="btn-secondary" onclick="quickRun(['fetchHtml','chapters'])">📋 Fetch Chapters</button>
    </div>
  </div>

  <!-- Config -->
  <div class="card">
    <h2>Configuration</h2>

    <details open>
      <summary>📖 Manga</summary>
      <div class="detail-body">
        <div class="field"><label>Title</label><input type="text" id="manga.title" /></div>
        <div class="field"><label>Author</label><input type="text" id="manga.author" /></div>
        <div class="row2">
          <div class="field"><label>Language</label><input type="text" id="manga.language" /></div>
          <div class="field"><label>Index URL</label><input type="url" id="manga.indexUrl" oninput="syncUrl(this.value)" /></div>
        </div>
      </div>
    </details>

    <details>
      <summary>🔍 Scrape</summary>
      <div class="detail-body">
        <div class="row2">
          <div class="field"><label>From chapter</label><input type="number" id="scrape.from" min="1" /></div>
          <div class="field"><label>Limit (blank = all)</label><input type="number" id="scrape.limit" min="1" placeholder="all" /></div>
        </div>
        <div class="row2">
          <div class="field"><label>Concurrency</label><input type="number" id="scrape.concurrency" min="1" max="20" /></div>
          <div class="field"><label>Output dir</label><input type="text" id="scrape.outputDir" /></div>
        </div>
        <div class="field"><label>Image selector</label><input type="text" id="scrape.imgSelector" /></div>
        <div class="field"><label>Referer</label><input type="url" id="scrape.referer" /></div>
        <div class="row3">
          <div class="field"><label>Scroll px</label><input type="number" id="scrape.scroll.distance" min="50" /></div>
          <div class="field"><label>Scroll delay ms</label><input type="number" id="scrape.scroll.delay" min="50" /></div>
          <div class="field"><label>Wait load ms</label><input type="number" id="scrape.waitAfterLoad" min="0" /></div>
        </div>
        <div class="row2">
          <div class="field"><label>Wait scroll ms</label><input type="number" id="scrape.waitAfterScroll" min="0" /></div>
          <div class="field"><label>Wait between chapters ms</label><input type="number" id="scrape.waitBetweenChapters" min="0" /></div>
        </div>
        <div class="check-row">
          <input type="checkbox" id="scrape.headless" />
          <label for="scrape.headless">Headless (no visible browser)</label>
        </div>
        <div id="urlsBadge" class="url-badge" onclick="openUrlModal()">📋 <span>0</span> chapters &nbsp;›</div>
      </div>
    </details>

    <details>
      <summary>📚 EPUB</summary>
      <div class="detail-body">
        <div class="row2">
          <div class="field"><label>Output file</label><input type="text" id="epub.outputFile" /></div>
          <div class="field"><label>Input dir (blank = scrape dir)</label><input type="text" id="epub.inputDir" placeholder="(same as scrape)" /></div>
        </div>
        <div class="field"><label>Volumes / Sections</label></div>
        <table class="sec-table">
          <thead><tr><th>Name</th><th>From</th><th>To</th><th></th></tr></thead>
          <tbody id="sectionsBody"></tbody>
        </table>
        <button class="btn-secondary add-sec" onclick="addSection()">+ Add volume</button>
      </div>
    </details>

    <details>
      <summary>🗜️ Compress</summary>
      <div class="detail-body">
        <div class="field">
          <label>JPEG/PNG quality: <span id="qualityVal">80</span></label>
          <div class="range-row">
            <input type="range" id="compress.quality" min="1" max="100"
              oninput="document.getElementById('qualityVal').textContent=this.value" />
          </div>
        </div>
        <div class="row3">
          <div class="field"><label>Max width px (blank = no limit)</label><input type="number" id="compress.maxWidth" min="100" placeholder="none" /></div>
          <div class="field"><label>Concurrency</label><input type="number" id="compress.concurrency" min="1" max="20" /></div>
          <div class="field"><label>Output dir</label><input type="text" id="compress.outputDir" /></div>
        </div>
      </div>
    </details>

    <div class="save-row">
      <button class="btn-success" onclick="saveConfig()">💾 Save Config</button>
    </div>
  </div>

  <!-- Actions -->
  <div class="card">
    <h2>Run Steps</h2>
    <div class="actions-grid">
      <button class="btn-secondary" onclick="run(['fetchHtml'])">🌐 Fetch HTML</button>
      <button class="btn-secondary" onclick="run(['chapters'])">📋 Get Chapters</button>
      <button class="btn-secondary" onclick="run(['scrape'])">⬇️ Scrape</button>
      <button class="btn-secondary" onclick="run(['compress'])">🗜️ Compress</button>
      <button class="btn-secondary" onclick="run(['epub'])">📚 Build EPUB</button>
      <button class="btn-secondary" onclick="run(['epub:webtoon'])">📜 EPUB Webtoon</button>
      <button class="btn-secondary" onclick="run(['cbz'])">📦 Build CBZ</button>
      <button class="btn-secondary" onclick="run(['scrape','compress','epub'])">⚡ Scrape → EPUB</button>
    </div>
    <div class="actions-row">
      <button class="btn-primary" onclick="run(['fetchHtml','chapters','scrape','compress','epub'])">▶ Run All</button>
      <button class="btn-danger" id="stopBtn" onclick="stop()" disabled>⏹ Stop</button>
    </div>
  </div>

</aside>

<!-- ── main content ── -->
<main class="main">

  <!-- Progress -->
  <div class="card">
    <h2>Progress</h2>
    <div id="steps" class="steps"><span class="step-pill">—</span></div>
    <div class="progress-wrap">
      <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
      <div id="progressText" class="progress-text"></div>
    </div>
  </div>

  <!-- Log -->
  <div class="card" style="flex:1">
    <h2>Log</h2>
    <div class="log-controls">
      <label><input type="checkbox" id="autoScroll" checked /> Auto-scroll</label>
      <button class="btn-secondary" onclick="clearLog()">Clear</button>
    </div>
    <div id="logBox" class="log-box">
      <div class="log-empty">Waiting for output…</div>
    </div>
  </div>

</main>
</div>

<!-- ── URL Manager Modal ── -->
<div class="modal-overlay hidden" id="urlModal" onclick="e => e.target===this && closeUrlModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3>Chapter URLs</h3>
      <button class="close-btn" onclick="closeUrlModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>Current URLs (one per line — edit directly)</label>
        <textarea class="url-list" id="urlListArea" rows="12" spellcheck="false"></textarea>
      </div>
      <div class="add-urls-area field">
        <label>Paste additional URLs to append</label>
        <textarea id="addUrlsArea" rows="4" placeholder="https://truyenqqko.com/...chap-50&#10;https://truyenqqko.com/...chap-51" spellcheck="false"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <span class="count" id="urlModalCount">0 URLs</span>
      <button class="btn-secondary" onclick="clearAllUrls()">🗑 Clear all</button>
      <button class="btn-secondary" onclick="closeUrlModal()">Cancel</button>
      <button class="btn-primary" onclick="saveUrls()">💾 Save</button>
    </div>
  </div>
</div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let es = null;
let cfg = {};

const STEP_LABELS = {
  fetchHtml:     '🌐 Fetch HTML',
  chapters:      '📋 Chapters',
  scrape:        '⬇️ Scrape',
  compress:      '🗜️ Compress',
  epub:          '📚 EPUB',
  'epub:webtoon':'📜 Webtoon',
  cbz:           '📦 CBZ',
};

// ── Init ─────────────────────────────────────────────────────────────────────
(async () => {
  await loadConfig();
  connectSSE();
})();

// ── Config ───────────────────────────────────────────────────────────────────
async function loadConfig() {
  const res = await fetch('/api/config');
  cfg = await res.json();
  fillForm(cfg);
}

function fillForm(c) {
  set('manga.title',     c.manga?.title     ?? '');
  set('manga.author',    c.manga?.author    ?? '');
  set('manga.language',  c.manga?.language  ?? 'vi');
  set('manga.indexUrl',  c.manga?.indexUrl  ?? '');
  syncUrl(c.manga?.indexUrl ?? '');

  set('scrape.from',             c.scrape?.from             ?? 1);
  set('scrape.limit',            c.scrape?.limit            ?? '');
  set('scrape.concurrency',      c.scrape?.concurrency      ?? 1);
  set('scrape.outputDir',        c.scrape?.outputDir        ?? 'output');
  set('scrape.imgSelector',      c.scrape?.imgSelector      ?? '.page-chapter img');
  set('scrape.referer',          c.scrape?.referer          ?? '');
  set('scrape.scroll.distance',  c.scrape?.scroll?.distance ?? 400);
  set('scrape.scroll.delay',     c.scrape?.scroll?.delay    ?? 100);
  set('scrape.waitAfterLoad',    c.scrape?.waitAfterLoad    ?? 2000);
  set('scrape.waitAfterScroll',  c.scrape?.waitAfterScroll  ?? 1500);
  set('scrape.waitBetweenChapters', c.scrape?.waitBetweenChapters ?? 1000);
  document.getElementById('scrape.headless').checked = c.scrape?.headless ?? true;
  const urlCount = (c.scrape?.urls ?? []).length;
  document.querySelector('#urlsBadge span').textContent = urlCount;

  set('epub.outputFile', c.epub?.outputFile ?? 'manga.epub');
  set('epub.inputDir',   c.epub?.inputDir   ?? '');

  set('compress.quality',     c.compress?.quality    ?? 80);
  set('compress.maxWidth',    c.compress?.maxWidth   ?? '');
  set('compress.concurrency', c.compress?.concurrency ?? 4);
  set('compress.outputDir',   c.compress?.outputDir  ?? 'output-compress');
  document.getElementById('qualityVal').textContent = c.compress?.quality ?? 80;

  renderSections(c.epub?.sections ?? []);
}

function collectConfig() {
  const c = JSON.parse(JSON.stringify(cfg)); // deep clone to preserve scrape.urls

  c.manga.title    = get('manga.title');
  c.manga.author   = get('manga.author');
  c.manga.language = get('manga.language');
  c.manga.indexUrl = get('manga.indexUrl');

  c.scrape.from             = int('scrape.from', 1);
  c.scrape.limit            = intOrNull('scrape.limit');
  c.scrape.concurrency      = int('scrape.concurrency', 1);
  c.scrape.outputDir        = get('scrape.outputDir');
  c.scrape.imgSelector      = get('scrape.imgSelector');
  c.scrape.referer          = get('scrape.referer');
  c.scrape.scroll           = { distance: int('scrape.scroll.distance', 400), delay: int('scrape.scroll.delay', 100) };
  c.scrape.waitAfterLoad    = int('scrape.waitAfterLoad', 2000);
  c.scrape.waitAfterScroll  = int('scrape.waitAfterScroll', 1500);
  c.scrape.waitBetweenChapters = int('scrape.waitBetweenChapters', 1000);
  c.scrape.headless         = document.getElementById('scrape.headless').checked;

  c.epub.outputFile = get('epub.outputFile');
  c.epub.inputDir   = get('epub.inputDir') || null;
  c.epub.sections   = getSections();

  c.compress = c.compress ?? {};
  c.compress.quality    = int('compress.quality', 80);
  c.compress.maxWidth   = intOrNull('compress.maxWidth');
  c.compress.concurrency = int('compress.concurrency', 4);
  c.compress.outputDir  = get('compress.outputDir');

  return c;
}

async function saveConfig() {
  cfg = collectConfig();
  await fetch('/api/config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(cfg) });
  flashBtn(event.target, '✓ Saved');
}

// ── Sections ─────────────────────────────────────────────────────────────────
function renderSections(sections) {
  const tbody = document.getElementById('sectionsBody');
  tbody.innerHTML = '';
  (sections ?? []).forEach(s => addSectionRow(s.name, s.from, s.to));
}

function addSection() { addSectionRow('', 1, 50); }

function addSectionRow(name = '', from = 1, to = 50) {
  const tbody = document.getElementById('sectionsBody');
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td><input type="text" value="${esc(name)}" placeholder="Vol 1.epub" /></td>
    <td><input type="number" value="${from}" min="1" /></td>
    <td><input type="number" value="${to}"   min="1" /></td>
    <td><button class="del-btn" onclick="this.closest('tr').remove()">×</button></td>`;
  tbody.appendChild(tr);
}

function getSections() {
  const rows = document.querySelectorAll('#sectionsBody tr');
  const sections = [];
  rows.forEach(tr => {
    const [nameEl, fromEl, toEl] = tr.querySelectorAll('input');
    if (nameEl.value.trim()) sections.push({ name: nameEl.value.trim(), from: +fromEl.value, to: +toEl.value });
  });
  return sections.length ? sections : null;
}

// ── Run / Stop ────────────────────────────────────────────────────────────────
function syncUrl(val) {
  const qi = document.getElementById('quickUrl');
  const ci = document.getElementById('manga.indexUrl');
  if (document.activeElement !== qi) qi.value = val;
  if (document.activeElement !== ci) ci.value = val;
}

document.getElementById('quickUrl').addEventListener('input', e => {
  document.getElementById('manga.indexUrl').value = e.target.value;
});
document.getElementById('manga.indexUrl').addEventListener('input', e => {
  document.getElementById('quickUrl').value = e.target.value;
});

async function quickRun(steps) {
  const url = document.getElementById('quickUrl').value.trim();
  if (!url) { alert('Please enter a chapter list URL first.'); return; }
  const c = collectConfig();
  c.manga.indexUrl = url;
  await doRun(steps, c);
}

async function run(steps) {
  await doRun(steps, collectConfig());
}

async function doRun(steps, config) {
  clearLog();
  setStepPills(steps);
  const res = await fetch('/api/run', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ config, steps }),
  });
  if (!res.ok) {
    const { error } = await res.json();
    alert(error);
  }
}

async function stop() {
  await fetch('/api/stop', { method: 'POST' });
}

// ── SSE ───────────────────────────────────────────────────────────────────────
function connectSSE() {
  if (es) es.close();
  es = new EventSource('/api/log');
  es.onopen = () => { document.getElementById('dot').className = 'dot connected'; };
  es.onerror = () => { document.getElementById('dot').className = 'dot error'; };
  es.onmessage = e => handleEvent(JSON.parse(e.data));
}

function handleEvent(d) {
  if (d.t === 'log') {
    appendLog(d.text, d.level);
  } else if (d.t === 'progress') {
    setProgress(d.done, d.total);
  } else if (d.t === 'step') {
    markStep(d.i, 'active');
    appendLog(`\n── ${STEP_LABELS[d.step] ?? d.step} ──\n`, 'step');
  } else if (d.t === 'status') {
    setStatus(d.status, d.steps, d.step);
  }
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function setStatus(status, steps, stepIdx) {
  const badge = document.getElementById('statusBadge');
  const stopBtn = document.getElementById('stopBtn');
  const running = status === 'running';
  stopBtn.disabled = !running;

  const labels = { running: 'Running', done: 'Done', error: 'Error', stopped: 'Stopped', idle: 'Idle' };
  badge.className = `status-badge ${status}`;
  badge.innerHTML = running
    ? `<div class="spinner"></div> ${labels[status]}`
    : labels[status] ?? status;

  if (status === 'done')    markStep(steps?.length - 1, 'done');
  if (status === 'error')   markStep(stepIdx, 'error');
  if (status === 'stopped') markStep(stepIdx, 'stopped');
}

function setStepPills(steps) {
  const el = document.getElementById('steps');
  el.innerHTML = steps.map((s, i) =>
    `<div class="step-pill" id="pill-${i}">${STEP_LABELS[s] ?? s}</div>`
  ).join('');
  setProgress(0, 0);
}

function markStep(i, cls) {
  document.querySelectorAll('.step-pill').forEach((el, idx) => {
    if (idx < i)  el.className = 'step-pill done';
    if (idx === i) el.className = `step-pill ${cls}`;
  });
}

function setProgress(done, total) {
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = total > 0
    ? `${done} / ${total}  (${pct}%)`
    : '';
}

// ── Log ───────────────────────────────────────────────────────────────────────
const MAX_LINES = 3000;

function appendLog(text, level) {
  const box = document.getElementById('logBox');
  const empty = box.querySelector('.log-empty');
  if (empty) empty.remove();

  const cls = level === 'step'            ? 'step'
            : level === 'warn'            ? 'warn'
            : /✅/.test(text)             ? 'ok'
            : /❌/.test(text)             ? 'err'
            : /⚠️/.test(text)             ? 'warn'
            : 'info';

  const div = document.createElement('div');
  div.className = `log-line ${cls}`;
  div.textContent = text.replace(/\r/g, '');
  box.appendChild(div);

  while (box.children.length > MAX_LINES) box.removeChild(box.firstChild);

  if (document.getElementById('autoScroll').checked) {
    box.scrollTop = box.scrollHeight;
  }
}

function clearLog() {
  const box = document.getElementById('logBox');
  box.innerHTML = '<div class="log-empty">Waiting for output…</div>';
  setProgress(0, 0);
  document.getElementById('steps').innerHTML = '<span class="step-pill">—</span>';
}

// ── Util ──────────────────────────────────────────────────────────────────────
const get  = id => (document.getElementById(id)?.value ?? '').trim();
const set  = (id, v) => { const el = document.getElementById(id); if (el) el.value = v ?? ''; };
const int  = (id, def) => parseInt(get(id)) || def;
const intOrNull = id => { const v = parseInt(get(id)); return isNaN(v) ? null : v; };
const esc  = s => String(s).replace(/"/g, '&quot;');

async function flashBtn(btn, msg) {
  const orig = btn.textContent;
  btn.textContent = msg;
  await new Promise(r => setTimeout(r, 1500));
  btn.textContent = orig;
}

// ── URL Modal ─────────────────────────────────────────────────────────────────
function openUrlModal() {
  const urls = cfg.scrape?.urls ?? [];
  const area = document.getElementById('urlListArea');
  area.value = urls.join('\n');
  document.getElementById('addUrlsArea').value = '';
  updateUrlCount(urls.length);
  document.getElementById('urlModal').classList.remove('hidden');
  area.addEventListener('input', () => updateUrlCount(parseUrls(area.value).length));
}

function closeUrlModal() {
  document.getElementById('urlModal').classList.add('hidden');
}

function clearAllUrls() {
  document.getElementById('urlListArea').value = '';
  updateUrlCount(0);
}

function updateUrlCount(n) {
  document.getElementById('urlModalCount').textContent = `${n} URLs`;
}

function parseUrls(text) {
  return text.split('\n').map(l => l.trim()).filter(l => l.startsWith('http'));
}

async function saveUrls() {
  const existing = parseUrls(document.getElementById('urlListArea').value);
  const added    = parseUrls(document.getElementById('addUrlsArea').value);
  const merged   = [...new Set([...existing, ...added])];

  cfg.scrape = cfg.scrape ?? {};
  cfg.scrape.urls = merged;

  await fetch('/api/config', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(cfg),
  });

  document.querySelector('#urlsBadge span').textContent = merged.length;
  closeUrlModal();
}

// close modal on overlay click
document.getElementById('urlModal').addEventListener('click', function(e) {
  if (e.target === this) closeUrlModal();
});

// close on Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeUrlModal();
});
</script>
