<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manga Converter</title>
    <link rel="stylesheet" href="/shared.css" />
    <link rel="stylesheet" href="/index.css" />
  </head>
  <body>
    <div class="app">
      <!-- ── header ── -->
      <header>
        <h1>🗂 Manga Converter</h1>
        <div id="statusBadge" class="status-badge idle">Idle</div>
        <div id="dot" class="dot" title="SSE connection"></div>
        <a
          href="/reader.html"
          style="margin-left:8px;font-size:12px;color:var(--muted);text-decoration:none;padding:5px 10px;border:1px solid var(--border);border-radius:6px"
          >📖 Reader</a
        >
        <a
          href="/ebook-reader.html"
          style="margin-left:4px;font-size:12px;color:var(--muted);text-decoration:none;padding:5px 10px;border:1px solid var(--border);border-radius:6px"
          >📚 EPUB</a
        >
      </header>

      <!-- ── sidebar ── -->
      <aside class="sidebar">
        <!-- Quick Start -->
        <div class="card">
          <h2>Quick Start</h2>
          <div class="url-row">
            <input
              type="url"
              id="quickUrl"
              placeholder="Chapter list page URL…"
            />
          </div>
          <div class="quick-btns">
            <button
              class="btn-primary"
              onclick="
                quickRun([
                  'fetchHtml',
                  'chapters',
                  'scrape',
                ])
              "
            >
              ▶ Fetch & Run All
            </button>
            <button
              class="btn-secondary"
              onclick="quickRun(['fetchHtml', 'chapters'])"
            >
              📋 Fetch Chapters
            </button>
          </div>
        </div>

        <!-- Config -->
        <div class="card">
          <h2>Configuration</h2>

          <details open>
            <summary>📖 Manga</summary>
            <div class="detail-body">
              <div class="field">
                <label>Title</label><input type="text" id="manga.title" />
              </div>
              <div class="field">
                <label>Author</label><input type="text" id="manga.author" />
              </div>
              <div class="row2">
                <div class="field">
                  <label>Language</label
                  ><input type="text" id="manga.language" />
                </div>
                <div class="field">
                  <label>Index URL</label
                  ><input
                    type="url"
                    id="manga.indexUrl"
                    oninput="syncUrl(this.value)"
                  />
                </div>
              </div>
            </div>
          </details>

          <details>
            <summary>🔍 Scrape</summary>
            <div class="detail-body">
              <div class="row2">
                <div class="field">
                  <label>From chapter</label
                  ><input type="number" id="scrape.from" min="1" />
                </div>
                <div class="field">
                  <label>Limit (blank = all)</label
                  ><input
                    type="number"
                    id="scrape.limit"
                    min="1"
                    placeholder="all"
                  />
                </div>
              </div>
              <div class="row2">
                <div class="field">
                  <label>Concurrency</label
                  ><input
                    type="number"
                    id="scrape.concurrency"
                    min="1"
                    max="20"
                  />
                </div>
                <div class="field">
                  <label>Output dir</label
                  ><input type="text" id="scrape.outputDir" />
                </div>
              </div>
              <div class="field">
                <label>Image selector</label
                ><input type="text" id="scrape.imgSelector" />
              </div>
              <div class="field">
                <label>Referer</label><input type="url" id="scrape.referer" />
              </div>
              <div class="row3">
                <div class="field">
                  <label>Scroll px</label
                  ><input type="number" id="scrape.scroll.distance" min="50" />
                </div>
                <div class="field">
                  <label>Scroll delay ms</label
                  ><input type="number" id="scrape.scroll.delay" min="50" />
                </div>
                <div class="field">
                  <label>Wait load ms</label
                  ><input type="number" id="scrape.waitAfterLoad" min="0" />
                </div>
              </div>
              <div class="row2">
                <div class="field">
                  <label>Wait scroll ms</label
                  ><input type="number" id="scrape.waitAfterScroll" min="0" />
                </div>
                <div class="field">
                  <label>Wait between chapters ms</label
                  ><input
                    type="number"
                    id="scrape.waitBetweenChapters"
                    min="0"
                  />
                </div>
              </div>
              <div class="check-row">
                <input type="checkbox" id="scrape.headless" />
                <label for="scrape.headless"
                  >Headless (no visible browser)</label
                >
              </div>
              <div id="urlsBadge" class="url-badge" onclick="openUrlModal()">
                📋 <span>0</span> chapters &nbsp;›
              </div>
            </div>
          </details>

          <details>
            <summary>📚 EPUB</summary>
            <div class="detail-body">
              <div class="row2">
                <div class="field">
                  <label>Output file</label
                  ><input type="text" id="epub.outputFile" />
                </div>
                <div class="field">
                  <label>Input dir (blank = scrape dir)</label
                  ><input
                    type="text"
                    id="epub.inputDir"
                    placeholder="(same as scrape)"
                  />
                </div>
              </div>
              <div class="field"><label>Volumes / Sections</label></div>
              <table class="sec-table">
                <thead>
                  <tr>
                    <th>Name</th>
                    <th>From</th>
                    <th>To</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody id="sectionsBody"></tbody>
              </table>
              <button class="btn-secondary add-sec" onclick="addSection()">
                + Add volume
              </button>
            </div>
          </details>

          <details>
            <summary>🗜️ Compress</summary>
            <div class="detail-body">
              <div class="field">
                <label>JPEG/PNG quality: <span id="qualityVal">80</span></label>
                <div class="range-row">
                  <input
                    type="range"
                    id="compress.quality"
                    min="1"
                    max="100"
                    oninput="
                      document.getElementById('qualityVal').textContent =
                        this.value
                    "
                  />
                </div>
              </div>
              <div class="row3">
                <div class="field">
                  <label>Max width px (blank = no limit)</label
                  ><input
                    type="number"
                    id="compress.maxWidth"
                    min="100"
                    placeholder="none"
                  />
                </div>
                <div class="field">
                  <label>Concurrency</label
                  ><input
                    type="number"
                    id="compress.concurrency"
                    min="1"
                    max="20"
                  />
                </div>
                <div class="field">
                  <label>Output dir</label
                  ><input type="text" id="compress.outputDir" />
                </div>
              </div>
            </div>
          </details>

          <div class="save-row">
            <button class="btn-success" onclick="saveConfig()">
              💾 Save Config
            </button>
          </div>
        </div>

        <!-- Actions -->
        <div class="card">
          <h2>Run Steps</h2>
          <div class="actions-grid">
            <button class="btn-secondary" onclick="run(['fetchHtml'])">
              🌐 Fetch HTML
            </button>
            <button class="btn-secondary" onclick="run(['chapters'])">
              📋 Get Chapters
            </button>
            <button class="btn-secondary" onclick="run(['scrape'])">
              ⬇️ Scrape
            </button>
            <button class="btn-secondary" onclick="run(['compress'])">
              🗜️ Compress
            </button>
            <button class="btn-secondary" onclick="run(['epub'])">
              📚 Build EPUB
            </button>
            <button class="btn-secondary" onclick="run(['epub:webtoon'])">
              📜 EPUB Webtoon
            </button>
            <button class="btn-secondary" onclick="run(['cbz'])">
              📦 Build CBZ
            </button>
            <button
              class="btn-secondary"
              onclick="run(['scrape', 'compress', 'epub'])"
            >
              ⚡ Scrape → EPUB
            </button>
          </div>
          <div class="actions-row">
            <button
              class="btn-primary"
              onclick="
                run(['fetchHtml', 'chapters', 'scrape', 'compress', 'epub'])
              "
            >
              ▶ Run All
            </button>
            <button class="btn-danger" id="stopBtn" onclick="stop()" disabled>
              ⏹ Stop
            </button>
          </div>
        </div>
      </aside>

      <!-- ── main content ── -->
      <main class="main">
        <!-- Progress -->
        <div class="card">
          <h2>Progress</h2>
          <div id="steps" class="steps"><span class="step-pill">—</span></div>
          <div class="progress-wrap">
            <div class="progress-bar">
              <div id="progressFill" class="progress-fill"></div>
            </div>
            <div id="progressText" class="progress-text"></div>
          </div>
        </div>

        <!-- Tabbed: Log / Files -->
        <div
          class="card"
          style="flex: 1; display: flex; flex-direction: column"
        >
          <div class="tab-bar">
            <button
              class="tab active"
              id="tabBtnLog"
              onclick="switchTab('log')"
            >
              📋 Log
            </button>
            <button class="tab" id="tabBtnFiles" onclick="switchTab('files')">
              📁 Files
            </button>
          </div>

          <!-- Log panel -->
          <div
            id="panelLog"
            style="display: flex; flex-direction: column; flex: 1"
          >
            <div class="log-controls">
              <label
                ><input type="checkbox" id="autoScroll" checked />
                Auto-scroll</label
              >
              <button class="btn-secondary" onclick="clearLog()">Clear</button>
            </div>
            <div id="logBox" class="log-box" style="flex: 1">
              <div class="log-empty">Waiting for output…</div>
            </div>
          </div>

          <!-- Files panel -->
          <div id="panelFiles" style="display: none; flex: 1; overflow-y: auto">
            <div class="files-toolbar">
              <button class="btn-secondary" onclick="loadFiles()">
                ↻ Refresh
              </button>
            </div>
            <div id="filesContent">
              <div class="files-empty">Loading…</div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- ── URL Manager Modal ── -->
    <div
      class="modal-overlay hidden"
      id="urlModal"
      onclick="(e) => e.target === this && closeUrlModal()"
    >
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header">
          <h3>Chapter URLs</h3>
          <button class="close-btn" onclick="closeUrlModal()">×</button>
        </div>
        <div class="modal-body">
          <div class="field">
            <label>Current URLs (one per line — edit directly)</label>
            <textarea
              class="url-list"
              id="urlListArea"
              rows="12"
              spellcheck="false"
            ></textarea>
          </div>
          <div class="add-urls-area field">
            <label>Paste additional URLs to append</label>
            <textarea
              id="addUrlsArea"
              rows="4"
              placeholder="https://truyenqqko.com/...chap-50&#10;https://truyenqqko.com/...chap-51"
              spellcheck="false"
            ></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <span class="count" id="urlModalCount">0 URLs</span>
          <button class="btn-secondary" onclick="clearAllUrls()">
            🗑 Clear all
          </button>
          <button class="btn-secondary" onclick="closeUrlModal()">
            Cancel
          </button>
          <button class="btn-primary" onclick="saveUrls()">💾 Save</button>
        </div>
      </div>
    </div>

    <script src="./index.js">
    </script>
  </body>
</html>
