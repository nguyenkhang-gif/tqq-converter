<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EPUB Reader</title>
  <link rel="stylesheet" href="shared.css" />
  <link rel="stylesheet" href="ebook-reader.css" />
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <button class="back-btn" onclick="history.back()" style="padding:0;border:none;margin:0;width:auto">← Back</button>
        <h2 id="bookTitle">EPUB Reader</h2>
      </div>
      <div id="fileList" style="border-bottom:1px solid var(--border);padding:6px;flex-shrink:0;max-height:40%;overflow-y:auto"></div>
      <div class="chapter-list" id="chapList">
        <div style="padding:12px;color:var(--muted);font-size:12px">Select a file above</div>
      </div>
    </aside>
    <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

    <!-- Main -->
    <div class="main">
      <div class="toolbar">
        <button class="btn menu-btn" id="menuBtn" onclick="toggleSidebar()">☰</button>
        <button class="btn" onclick="prevChapter()" id="btnPrev">‹</button>
        <select class="chap-select" id="chapSelect" onchange="loadChapter(+this.value)" disabled></select>
        <button class="btn" onclick="nextChapter()" id="btnNext">›</button>

        <!-- Settings dropdown -->
        <div class="settings-wrap">
          <button class="btn" onclick="toggleSettings()" id="btnSettings" title="Settings">⚙️</button>
          <div class="settings-panel hidden" id="settingsPanel">
            <div class="settings-section">
              <div class="settings-label">Font size</div>
              <div class="settings-row">
                <button class="btn" onclick="changeFontSize(-1)">A−</button>
                <span id="fontSizeVal" style="font-size:13px;min-width:32px;text-align:center"></span>
                <button class="btn" onclick="changeFontSize(+1)">A+</button>
              </div>
            </div>
            <div class="settings-section">
              <div class="settings-label">Theme</div>
              <div class="settings-row">
                <button class="btn theme-btn" id="btnDark"  onclick="setTheme('dark')">🌙 Dark</button>
                <button class="btn theme-btn" id="btnSepia" onclick="setTheme('sepia')">📜 Sepia</button>
                <button class="btn theme-btn" id="btnLight" onclick="setTheme('light')">☀️ Light</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="viewer" id="viewer">
        <div class="placeholder">
          <span>No file selected</span>
          <span style="font-size:12px;color:var(--muted)">Open an EPUB from the file list</span>
        </div>
      </div>
    </div>
  </div>

  <script src="ebook-reader.js"></script>
</body>
</html>
