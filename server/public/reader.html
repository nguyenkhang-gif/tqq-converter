<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manga Reader</title>
    <style>
      :root {
        --bg: #0d0d0d;
        --surface: #161616;
        --border: #2a2a2a;
        --accent: #7c3aed;
        --text: #e5e5e5;
        --muted: #737373;
        --sidebar-w: 220px;
      }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, sans-serif;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }

      /* ── topbar ── */
      .topbar {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 0 14px;
        height: 48px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        z-index: 10;
      }
      .topbar a { color: var(--muted); text-decoration: none; font-size: 13px; }
      .topbar a:hover { color: var(--text); }
      .sep { color: var(--border); }
      #fileTitle {
        font-size: 14px;
        font-weight: 600;
        flex: 1;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        min-width: 0;
      }
      .page-info { font-size: 13px; color: var(--muted); white-space: nowrap; }
      .hamburger {
        display: none;
        background: none;
        border: none;
        color: var(--text);
        font-size: 20px;
        cursor: pointer;
        padding: 4px 6px;
        line-height: 1;
        border-radius: 4px;
      }
      .hamburger:hover { background: var(--border); }

      /* ── layout ── */
      .layout { display: flex; flex: 1; overflow: hidden; position: relative; }

      /* ── sidebar ── */
      .sidebar {
        width: var(--sidebar-w);
        border-right: 1px solid var(--border);
        overflow-y: auto;
        flex-shrink: 0;
        background: var(--surface);
        transition: transform .25s ease;
      }
      .sidebar-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,.6);
        z-index: 40;
      }
      .sidebar-title {
        font-size: 11px;
        font-weight: 600;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: .06em;
        padding: 12px 14px 6px;
      }
      .file-item {
        padding: 9px 14px;
        font-size: 13px;
        cursor: pointer;
        border-left: 3px solid transparent;
        transition: background .1s;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .file-item:hover { background: #1f1f1f; }
      .file-item.active { border-left-color: var(--accent); color: var(--accent); background: #1a1530; }
      .file-size { font-size: 11px; color: var(--muted); margin-top: 2px; }
      .no-files { padding: 16px 14px; font-size: 12px; color: var(--muted); }

      /* ── viewer ── */
      .viewer {
        flex: 1;
        overflow: hidden;
        position: relative;
        display: flex;
        flex-direction: column;
        min-width: 0;
      }
      .img-wrap {
        flex: 1;
        overflow: auto;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        background: #000;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }
      .img-wrap img { display: block; max-width: 100%; height: auto; user-select: none; pointer-events: none; }
      .img-wrap.fit-height img {
        max-width: none;
        height: 100%;
        max-height: calc(100vh - 48px - 52px);
        width: auto;
      }
      .img-wrap.webtoon { flex-direction: column; cursor: default; overflow-y: auto; }
      .img-wrap.webtoon img { max-width: 800px; width: 100%; height: auto; margin: 0 auto; display: block; }

      /* ── empty state ── */
      .empty {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        color: var(--muted);
      }
      .empty svg { opacity: .3; }

      /* ── controls ── */
      .controls {
        height: 52px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        background: var(--surface);
        border-top: 1px solid var(--border);
        flex-shrink: 0;
        padding: 0 12px;
      }
      button {
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-family: inherit;
        font-size: 13px;
        font-weight: 500;
        padding: 6px 14px;
        background: #1f1f1f;
        color: var(--text);
        border: 1px solid var(--border);
        transition: background .1s;
        white-space: nowrap;
      }
      button:hover:not(:disabled) { background: #2a2a2a; }
      button:disabled { opacity: .35; cursor: default; }

      .toggle-group {
        display: flex;
        border: 1px solid var(--border);
        border-radius: 6px;
        overflow: hidden;
        flex-shrink: 0;
      }
      .toggle-group button { border-radius: 0; border: none; border-right: 1px solid var(--border); padding: 6px 10px; }
      .toggle-group button:last-child { border-right: none; }
      .toggle-group button.on { background: #2a1f4a; color: var(--accent); }

      .page-jump { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted); flex-shrink: 0; }
      .page-jump input {
        width: 46px;
        text-align: center;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text);
        padding: 4px 6px;
        font-size: 13px;
      }
      .page-jump input:focus { outline: none; border-color: var(--accent); }

      /* loading */
      .loading {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0,0,0,.6);
        z-index: 5;
      }
      .spinner {
        width: 28px;
        height: 28px;
        border: 3px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin .6s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* ── mobile ── */
      @media (max-width: 680px) {
        .hamburger { display: block; }
        .topbar a, .sep { display: none; }

        .sidebar {
          position: fixed;
          top: 48px;
          left: 0;
          bottom: 0;
          z-index: 50;
          transform: translateX(-100%);
          border-right: 1px solid var(--border);
        }
        .sidebar.open { transform: translateX(0); }
        .sidebar-overlay.open { display: block; }

        .controls { gap: 6px; padding: 0 8px; height: 52px; }
        button { padding: 6px 10px; font-size: 12px; }
        .toggle-group button { padding: 6px 8px; }
        .page-jump input { width: 38px; font-size: 12px; }
        .page-jump { font-size: 12px; }

        /* hide text labels on nav buttons, keep arrows */
        #prevBtn::before { content: '←'; }
        #prevBtn span, #nextBtn span { display: none; }
        #nextBtn::after { content: '→'; }
        #prevBtn, #nextBtn { padding: 6px 12px; font-size: 16px; }
      }

      @media (max-width: 400px) {
        .page-jump { display: none; }
        .page-info { display: none; }
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <button class="hamburger" onclick="toggleSidebar()" title="Files">☰</button>
      <a href="/">← UI</a>
      <span class="sep">|</span>
      <span id="fileTitle">Select a file</span>
      <span class="page-info" id="pageInfo"></span>
    </div>

    <div class="layout">
      <div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>

      <aside class="sidebar" id="sidebar">
        <div class="sidebar-title">Files</div>
        <div id="fileList"><div class="no-files">Loading…</div></div>
      </aside>

      <div class="viewer" id="viewer">
        <div class="empty" id="emptyState">
          <svg width="64" height="64" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25"/>
          </svg>
          <span>Select a CBZ file to read</span>
        </div>
        <div class="img-wrap" id="imgWrap" style="display:none"></div>
        <div class="loading" id="loading" style="display:none"><div class="spinner"></div></div>
      </div>
    </div>

    <div class="controls" id="controls" style="display:none">
      <button id="prevBtn" onclick="go(-1)"><span>← Prev</span></button>
      <div class="page-jump">
        <input type="number" id="pageInput" min="1" onchange="jumpTo(+this.value - 1)" />
        <span id="totalPages">/ 0</span>
      </div>
      <button id="nextBtn" onclick="go(1)"><span>Next →</span></button>
      <div class="toggle-group">
        <button id="modeNormal"  onclick="setMode('normal')"  class="on" title="Fit width">↔</button>
        <button id="modeFitH"    onclick="setMode('fitH')"    title="Fit height">↕</button>
        <button id="modeWebtoon" onclick="setMode('webtoon')" title="Webtoon">≡</button>
      </div>
    </div>

    <script>
      let pages   = [];
      let current = 0;
      let curFile = null;
      let mode    = 'normal';

      // ── Init ─────────────────────────────────────────────────────────────────
      loadFileList();

      async function loadFileList() {
        const res   = await fetch('/api/files');
        const files = await res.json();
        const cbzs  = files.filter(f => f.type === 'cbz');
        const el    = document.getElementById('fileList');

        if (!cbzs.length) {
          el.innerHTML = '<div class="no-files">No CBZ files found.<br>Build one first.</div>';
          return;
        }

        el.innerHTML = cbzs.map((f, i) => `
          <div class="file-item" onclick="openFile(${i})" id="fi-${i}">
            ${f.name}
            <div class="file-size">${fmtSize(f.size)}</div>
          </div>`).join('');

        window._files = cbzs;
      }

      // ── Sidebar (mobile) ─────────────────────────────────────────────────────
      function toggleSidebar() {
        const open = document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('open', open);
      }
      function closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('overlay').classList.remove('open');
      }

      // ── Open file ────────────────────────────────────────────────────────────
      async function openFile(idx) {
        const f = window._files[idx];
        curFile = f.name;

        document.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`fi-${idx}`)?.classList.add('active');
        document.getElementById('fileTitle').textContent = f.name;
        closeSidebar();

        showLoading(true);
        const res = await fetch(`/api/reader/${encodeURIComponent(f.name)}/pages`);
        pages = await res.json();
        showLoading(false);

        if (!pages.length) { alert('No images found in this CBZ.'); return; }

        document.getElementById('emptyState').style.display  = 'none';
        document.getElementById('imgWrap').style.display     = 'flex';
        document.getElementById('controls').style.display    = 'flex';
        document.getElementById('totalPages').textContent    = `/ ${pages.length}`;

        current = 0;
        applyMode();
        render();
      }

      // ── Navigation ───────────────────────────────────────────────────────────
      function go(delta) {
        if (mode === 'webtoon') return;
        current = Math.max(0, Math.min(pages.length - 1, current + delta));
        render();
      }

      function jumpTo(idx) {
        current = Math.max(0, Math.min(pages.length - 1, idx));
        render();
      }

      function render() {
        if (mode === 'webtoon') { renderWebtoon(); return; }

        const wrap = document.getElementById('imgWrap');
        wrap.innerHTML = '';

        const img = new Image();
        img.src = `/api/reader/${encodeURIComponent(curFile)}/page/${pages[current]}`;
        img.ondragstart = () => false;
        wrap.appendChild(img);
        updateControls();
      }

      function renderWebtoon() {
        const wrap = document.getElementById('imgWrap');
        wrap.innerHTML = '<div class="spinner" style="margin:40px auto"></div>';

        Promise.all(pages.map(p => new Promise(resolve => {
          const img = new Image();
          img.src = `/api/reader/${encodeURIComponent(curFile)}/page/${p}`;
          img.onload = img.onerror = () => resolve(img);
        }))).then(imgs => {
          wrap.innerHTML = '';
          imgs.forEach(img => {
            img.style.cssText = 'max-width:800px;width:100%;height:auto;display:block;margin:0 auto;';
            wrap.appendChild(img);
          });
        });

        updateControls();
      }

      // ── Mode ─────────────────────────────────────────────────────────────────
      function setMode(m) { mode = m; applyMode(); render(); }

      function applyMode() {
        const wrap = document.getElementById('imgWrap');
        wrap.className = 'img-wrap' + (mode === 'fitH' ? ' fit-height' : mode === 'webtoon' ? ' webtoon' : '');

        document.getElementById('modeNormal').classList.toggle('on',  mode === 'normal');
        document.getElementById('modeFitH').classList.toggle('on',   mode === 'fitH');
        document.getElementById('modeWebtoon').classList.toggle('on', mode === 'webtoon');

        const hide = mode === 'webtoon';
        ['prevBtn', 'nextBtn'].forEach(id => document.getElementById(id).style.display = hide ? 'none' : '');
        document.querySelector('.page-jump').style.display = hide ? 'none' : '';
      }

      function updateControls() {
        document.getElementById('prevBtn').disabled = current === 0;
        document.getElementById('nextBtn').disabled = current === pages.length - 1;
        document.getElementById('pageInfo').textContent = mode !== 'webtoon' ? `${current + 1} / ${pages.length}` : '';
        document.getElementById('pageInput').value = current + 1;
      }

      // ── Click to navigate ────────────────────────────────────────────────────
      document.getElementById('imgWrap').addEventListener('click', e => {
        if (mode === 'webtoon') return;
        go(e.clientX > window.innerWidth / 2 ? 1 : -1);
      });

      // ── Keyboard ─────────────────────────────────────────────────────────────
      document.addEventListener('keydown', e => {
        if (e.target.tagName === 'INPUT') return;
        if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(1);
        if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   go(-1);
      });

      // ── Touch swipe ──────────────────────────────────────────────────────────
      let touchStartX = 0, touchStartY = 0;

      document.getElementById('imgWrap').addEventListener('touchstart', e => {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
      }, { passive: true });

      document.getElementById('imgWrap').addEventListener('touchend', e => {
        if (mode === 'webtoon') return;
        const dx = e.changedTouches[0].clientX - touchStartX;
        const dy = e.changedTouches[0].clientY - touchStartY;
        if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
          go(dx < 0 ? 1 : -1); // swipe left = next, swipe right = prev
        }
      }, { passive: true });

      // ── Helpers ──────────────────────────────────────────────────────────────
      function showLoading(v) { document.getElementById('loading').style.display = v ? 'flex' : 'none'; }
      function fmtSize(b) { return b > 1e6 ? (b/1e6).toFixed(1)+' MB' : (b/1024).toFixed(0)+' KB'; }
    </script>
  </body>
</html>
