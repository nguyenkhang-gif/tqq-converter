<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reader</title>
    <link rel="stylesheet" href="/shared.css" />
    <link rel="stylesheet" href="/reader.css" />
  </head>
  <body>
    <div class="overlay" id="overlay"></div>
    <div class="app">
      <!-- sidebar -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <h2 id="manga-title">Chapters</h2>
        </div>
        <div class="chapter-list" id="chapter-list"></div>
      </aside>

      <!-- main -->
      <div class="main">
        <div class="toolbar">
          <button class="btn menu-btn" id="menu-btn" title="Menu">☰</button>

          <button class="btn icon-btn" id="btn-prev-chap" disabled title="Chap trước">‹</button>

          <select id="chap-select" class="chap-select">
            <option>Chọn chapter</option>
          </select>

          <button class="btn icon-btn" id="btn-next-chap" disabled title="Chap sau">›</button>

          <div class="sep"></div>

          <button class="btn active" id="btn-vert" title="Đọc dọc">↕</button>
          <button class="btn" id="btn-horiz" title="Đọc ngang">↔</button>

          <div class="sep"></div>

          <span class="page-info" id="page-info"></span>
        </div>

        <div class="viewer vert" id="viewer">
          <div class="placeholder">
            <span>Chọn chapter để bắt đầu đọc</span>
          </div>
        </div>
      </div>
    </div>

    <script src="./reader.js"></script>
  </body>
</html>
